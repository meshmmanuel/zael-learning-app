<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  #app {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    overflow-x: hidden;
    transition: background 0.5s;
  }
  .top-bar { width:100%; padding:14px 20px 10px; display:flex; flex-direction:column; align-items:center; gap:8px; }
  .q-label { font-size:18px; font-weight:800; color:rgba(0,0,0,0.62); letter-spacing:0.5px; }
  .progress-track { width:100%; height:14px; background:rgba(0,0,0,0.12); border-radius:99px; overflow:hidden; }
  .progress-fill { height:100%; background:rgba(0,0,0,0.32); border-radius:99px; transition:width 0.4s ease; }
  .question-area { width:100%; flex:1; display:flex; flex-direction:column; align-items:center; padding:0 20px 16px; gap:12px; }
  .toolbar {
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .sound-toggle {
    border: none;
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 14px;
    font-weight: 800;
    background: rgba(255,255,255,0.65);
    color: rgba(0,0,0,0.7);
    cursor: pointer;
  }
  .math-display { background:rgba(255,255,255,0.62); border-radius:24px; padding:16px 20px 20px; display:flex; flex-direction:column; align-items:flex-end; gap:2px; min-width:180px; width:min(100%,420px); box-shadow:0 4px 20px rgba(0,0,0,0.08); }
  .math-row { display:flex; align-items:center; justify-content:flex-end; gap:10px; width:100%; flex-wrap:wrap; font-family:'Fredoka One',cursive; font-size:clamp(44px,12vw,64px); line-height:1.1; color:#222; }
  .math-row .op { font-size:clamp(34px,10vw,52px); color:#444; margin-right:4px; }
  .math-divider { width:100%; height:4px; background:#333; border-radius:4px; margin:4px 0 2px; }
  .math-blank { font-family:'Fredoka One',cursive; font-size:clamp(44px,12vw,64px); color:#777; min-width:60px; text-align:right; max-width:100%; overflow-wrap:anywhere; }
  .emoji-zone { background:rgba(255,255,255,0.56); border-radius:24px; padding:14px 14px 10px; width:100%; min-height:100px; box-shadow:0 4px 20px rgba(0,0,0,0.07); }
  .emoji-zone-title { font-size:14px; font-weight:800; color:rgba(0,0,0,0.56); text-align:center; margin-bottom:10px; text-transform:uppercase; letter-spacing:1px; }
  .addition-groups { display:flex; align-items:center; justify-content:center; gap:12px; flex-wrap:wrap; }
  .emoji-group { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; max-width:140px; }
  .emoji-item { font-size:40px; line-height:1; user-select:none; }
  .plus-sign { font-family:'Fredoka One',cursive; font-size:48px; color:#333; line-height:1; }
  .add-builder { display:flex; flex-wrap:wrap; align-items:stretch; justify-content:center; gap:10px; width:100%; }
  .add-card { background:rgba(255,255,255,0.66); border-radius:18px; padding:10px; min-width:130px; display:flex; flex-direction:column; gap:8px; align-items:center; }
  .add-card-title { font-size:13px; font-weight:800; color:rgba(0,0,0,0.58); text-transform:uppercase; letter-spacing:0.8px; }
  .add-card-count { font-family:'Fredoka One',cursive; font-size:20px; color:#333; }
  .add-card-items { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; min-height:48px; }
  .add-card-controls { display:flex; gap:8px; }
  .mini-btn { border:none; border-radius:12px; width:44px; height:40px; font-size:22px; background:rgba(255,255,255,0.84); cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
  .mini-btn:disabled { opacity:0.45; cursor:not-allowed; }
  .sub-grid { display:grid; grid-template-columns:repeat(5,54px); gap:8px; justify-content:center; min-height:54px; }
  .sub-animal { font-size:40px; line-height:1; cursor:pointer; position:relative; user-select:none; width:54px; height:54px; display:inline-flex; align-items:center; justify-content:center; transition:opacity 0.15s; border:none; background:none; }
  .sub-animal.crossed { opacity:0.2; }
  .sub-animal.crossed::after { content:'❌'; font-size:30px; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); opacity:1; }
  .sub-controls { display:flex; justify-content:center; margin-top:10px; }
  .add-animal-btn { width:54px; height:54px; border-radius:14px; border:3px dashed rgba(0,0,0,0.25); background:rgba(255,255,255,0.5); font-size:28px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
  .add-animal-btn:hover { background:rgba(255,255,255,0.85); transform:scale(1.1); }
  .sub-hint { font-size:13px; font-weight:800; color:rgba(0,0,0,0.5); text-align:center; margin-top:10px; }
  .answer-section { width:100%; display:flex; flex-direction:column; align-items:center; gap:10px; }
  .answer-label { font-size:15px; font-weight:800; color:rgba(0,0,0,0.56); text-transform:uppercase; letter-spacing:1px; }
  .number-picker { display:flex; gap:6px; background:rgba(255,255,255,0.65); border-radius:20px; padding:8px 10px; box-shadow:0 4px 20px rgba(0,0,0,0.1); flex-wrap:wrap; justify-content:center; max-width:420px; width:min(100%,420px); }
  .num-btn { min-width:52px; height:52px; padding:0 12px; border-radius:14px; border:3px solid transparent; background:rgba(255,255,255,0.75); font-family:'Fredoka One',cursive; font-size:clamp(22px,6vw,30px); color:#222; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
  .num-btn:hover { transform:scale(1.1); background:rgba(255,255,255,0.95); }
  .num-btn.selected { border-color:rgba(0,0,0,0.56); background:rgba(0,0,0,0.12); color:#111; transform:scale(1.12); box-shadow:0 4px 14px rgba(0,0,0,0.18); }
  .num-btn:focus-visible,
  .submit-btn:focus-visible,
  .play-again-btn:focus-visible,
  .sound-toggle:focus-visible,
  .sub-animal:focus-visible,
  .add-animal-btn:focus-visible {
    outline: 4px solid #1f6feb;
    outline-offset: 2px;
  }
  .submit-btn { width:90%; max-width:320px; height:68px; border-radius:20px; border:none; background:rgba(0,0,0,0.34); color:#fff; font-family:'Fredoka One',cursive; font-size:24px; cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,0.15); transition:all 0.15s; letter-spacing:0.5px; }
  .submit-btn:hover { background:rgba(0,0,0,0.44); transform:scale(1.02); }
  .submit-btn:active { transform:scale(0.97); }
  .feedback-msg { font-family:'Fredoka One',cursive; font-size:26px; text-align:center; min-height:36px; transition:all 0.2s; letter-spacing:0.5px; }
  .feedback-msg.wrong { color:#a1281f; }
  .feedback-msg.right { color:#1d8a4d; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 30%{transform:translateY(-18px)} 60%{transform:translateY(-8px)} }
  .shake { animation:shake 0.4s ease; }
  .end-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:40px 24px; gap:18px; text-align:center; width:100%; }
  .end-trophy { font-size:90px; animation:bounce 0.8s ease 0.2s both; }
  .end-title { font-family:'Fredoka One',cursive; font-size:42px; color:rgba(0,0,0,0.75); line-height:1.1; }
  .end-score { font-family:'Fredoka One',cursive; font-size:72px; color:rgba(0,0,0,0.8); }
  .end-stars { font-size:48px; letter-spacing:6px; }
  .best-score { font-size:18px; font-weight:800; color:rgba(0,0,0,0.62); }
  .stats { font-size:16px; font-weight:800; color:rgba(0,0,0,0.6); }
  .play-again-btn { width:280px; height:72px; border-radius:22px; border:none; background:rgba(0,0,0,0.34); color:#fff; font-family:'Fredoka One',cursive; font-size:28px; cursor:pointer; box-shadow:0 4px 20px rgba(0,0,0,0.15); transition:all 0.15s; }
  .play-again-btn:hover { background:rgba(0,0,0,0.45); transform:scale(1.04); }
  .confetti-piece { position:fixed; width:10px; height:10px; border-radius:2px; pointer-events:none; z-index:999; animation:fall linear forwards; }
  @keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
</style>

<div id="app">
  <div id="main-screen" style="width:100%;display:flex;flex-direction:column;align-items:center;">
    <div class="top-bar">
      <div class="q-label" id="q-label">Question 1 of 10</div>
      <div class="progress-track" aria-hidden="true"><div class="progress-fill" id="progress-fill" style="width:10%"></div></div>
    </div>
    <div class="question-area">
      <div class="toolbar">
        <button id="sound-toggle" class="sound-toggle" type="button" aria-pressed="true">Sound: On</button>
        <button id="hint-toggle" class="sound-toggle" type="button" aria-pressed="false">Hint: Off</button>
      </div>
      <div class="math-display" id="math-display" aria-live="polite">
        <div class="math-row"><span id="num1-val">5</span></div>
        <div class="math-row"><span class="op" id="op-sign">+</span><span id="num2-val">3</span></div>
        <div class="math-divider"></div>
        <div class="math-blank" id="math-blank">?</div>
      </div>
      <div class="emoji-zone" id="emoji-zone">
        <div class="emoji-zone-title" id="emoji-zone-title">Count them all!</div>
        <div id="emoji-content"></div>
        <div class="sub-hint" id="sub-hint" style="display:none"></div>
      </div>
      <div class="answer-section">
        <div class="answer-label">My answer is...</div>
        <div class="number-picker" id="number-picker" role="group" aria-label="Pick an answer number"></div>
        <div class="feedback-msg" id="feedback-msg" aria-live="polite"></div>
        <button class="submit-btn" id="submit-btn" type="button">That's my answer! ✅</button>
      </div>
    </div>
  </div>
  <div id="end-screen" class="end-screen" style="display:none;"></div>
</div>

<script>
const THEMES = [
  {name:'fruits',emojis:['🍎','🍋','🍇']},
  {name:'animals',emojis:['🐸','🐶','🐱']},
  {name:'space',emojis:['🚀','⭐','🪐']},
  {name:'ocean',emojis:['🐠','🐙','🦀']},
  {name:'jungle',emojis:['🦁','🐘','🦒']},
];
const PASTELS = ['#FFD6D6','#FFE4C4','#FFFACD','#D4F1C0','#C8E6FF','#E8D5FF','#FFD6F0','#D6FFF6'];
const BEST_SCORE_KEY = 'kidsMathV3BestScore';

let theme, emoji, bgColor;
let questions = [], qIndex = 0, score = 0;
let selectedAnswer = null;
let crossedSet = new Set();
let placedCount = 0;
let currentQ = null;
let blocked = false;
let maxAnswer = 9;
let soundOn = true;
let hintOn = false;
let stats = { addCorrect: 0, addTotal: 0, subCorrect: 0, subTotal: 0 };
let audioCtx = null;
let soundFx = {};
let keyInputBuffer = '';
let keyInputTimer = null;
let addGroup1Count = 0;
let addGroup2Count = 0;

const SOUND_FILES = {
  select: 'audio/click.mp3',
  wrong: 'audio/incorrect.mp3',
  correct: 'audio/correct.mp3',
  celebration: 'audio/celebration.mp3',
  endPerfect: 'audio/congratulations.mp3',
  endTryAgain: 'audio/try-again.mp3',
  addEmoji: 'audio/add.mp3',
  toggle: 'audio/toggle.mp3',
  submit: 'audio/submit.mp3',
};

function rnd(a, b){ return Math.floor(Math.random() * (b - a + 1)) + a; }

function genQuestions(){
  const qs = [];
  for(let i = 0; i < 5; i++){
    const a = rnd(1, 9), b = rnd(1, 9);
    qs.push({type:'add', a, b, ans:a+b});
  }
  for(let i = 0; i < 5; i++){
    const a = rnd(3, 12), b = rnd(1, a-1);
    qs.push({type:'sub', a, b, ans:a-b});
  }
  return qs.sort(() => Math.random() - 0.5);
}

function init(){
  theme = THEMES[Math.floor(Math.random() * THEMES.length)];
  emoji = theme.emojis[Math.floor(Math.random() * theme.emojis.length)];
  bgColor = PASTELS[Math.floor(Math.random() * PASTELS.length)];
  document.getElementById('app').style.background = bgColor;
  questions = genQuestions();
  maxAnswer = Math.max(...questions.map(q => q.ans));
  qIndex = 0;
  score = 0;
  stats = { addCorrect: 0, addTotal: 0, subCorrect: 0, subTotal: 0 };
  document.getElementById('main-screen').style.display = 'flex';
  document.getElementById('end-screen').style.display = 'none';
  initSoundFx();
  loadQuestion();
}

function loadQuestion(){
  blocked = false;
  selectedAnswer = null;
  crossedSet.clear();
  placedCount = 0;
  addGroup1Count = 0;
  addGroup2Count = 0;
  currentQ = questions[qIndex];
  document.getElementById('q-label').textContent = `Question ${qIndex + 1} of 10`;
  document.getElementById('progress-fill').style.width = `${((qIndex + 1) / 10) * 100}%`;
  document.getElementById('num1-val').textContent = currentQ.a;
  document.getElementById('op-sign').textContent = currentQ.type === 'sub' ? '−' : '+';
  document.getElementById('num2-val').textContent = currentQ.b;
  document.getElementById('math-blank').textContent = '?';
  const fb = document.getElementById('feedback-msg');
  fb.textContent = '';
  fb.className = 'feedback-msg';
  buildNumberPicker();
  buildEmojiZone();
}

function buildNumberPicker(){
  const picker = document.getElementById('number-picker');
  picker.innerHTML = '';
  for(let n = 0; n <= maxAnswer; n++){
    const btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.type = 'button';
    btn.textContent = n;
    btn.setAttribute('aria-label', `Answer ${n}`);
    btn.onclick = () => selectNumber(n, btn);
    picker.appendChild(btn);
  }
}

function selectNumber(n, btn){
  if(blocked) return;
  selectedAnswer = n;
  document.getElementById('math-blank').textContent = n;
  document.querySelectorAll('.num-btn').forEach(b => {
    b.classList.remove('selected');
    b.setAttribute('aria-pressed', 'false');
  });
  btn.classList.add('selected');
  btn.setAttribute('aria-pressed', 'true');
  playSelectSound();
}

function buildEmojiZone(){
  const content = document.getElementById('emoji-content');
  const hint = document.getElementById('sub-hint');
  content.innerHTML = '';
  if(currentQ.type === 'add'){
    updateAdditionZone();
  } else {
    updateSubtractionZone();
  }
}

function updateAdditionZone(){
  const content = document.getElementById('emoji-content');
  const hint = document.getElementById('sub-hint');
  const doneA = addGroup1Count >= currentQ.a;
  const doneB = addGroup2Count >= currentQ.b;
  const totalBuilt = addGroup1Count + addGroup2Count;

  if(!doneA){
    document.getElementById('emoji-zone-title').textContent = `Build the first group: ${currentQ.a}`;
  } else if(!doneB){
    document.getElementById('emoji-zone-title').textContent = `Great! Now build the second group: ${currentQ.b}`;
  } else {
    document.getElementById('emoji-zone-title').textContent = 'Both groups built! Count them all.';
  }

  hint.style.display = hintOn ? 'block' : 'none';
  if(doneA && doneB){
    hint.textContent = `${currentQ.a} + ${currentQ.b} = ?`;
  } else {
    hint.textContent = `Progress: ${addGroup1Count}/${currentQ.a} + ${addGroup2Count}/${currentQ.b}`;
  }

  content.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'add-builder';

  const createAddCard = (label, target, count, onAdd, onRemove) => {
    const card = document.createElement('div');
    card.className = 'add-card';
    const title = document.createElement('div');
    title.className = 'add-card-title';
    title.textContent = label;
    const countLabel = document.createElement('div');
    countLabel.className = 'add-card-count';
    countLabel.textContent = `${count} / ${target}`;
    const items = document.createElement('div');
    items.className = 'add-card-items';
    for(let i = 0; i < count; i++){
      const e = document.createElement('span');
      e.className = 'emoji-item';
      e.textContent = emoji;
      items.appendChild(e);
    }
    const controls = document.createElement('div');
    controls.className = 'add-card-controls';
    const addBtn = document.createElement('button');
    addBtn.className = 'mini-btn';
    addBtn.type = 'button';
    addBtn.textContent = '➕';
    addBtn.setAttribute('aria-label', `Add one ${emoji}`);
    addBtn.disabled = count >= target || blocked;
    addBtn.onclick = onAdd;
    const removeBtn = document.createElement('button');
    removeBtn.className = 'mini-btn';
    removeBtn.type = 'button';
    removeBtn.textContent = '➖';
    removeBtn.setAttribute('aria-label', `Remove one ${emoji}`);
    removeBtn.disabled = count <= 0 || blocked;
    removeBtn.onclick = onRemove;
    controls.appendChild(removeBtn);
    controls.appendChild(addBtn);
    card.appendChild(title);
    card.appendChild(countLabel);
    card.appendChild(items);
    card.appendChild(controls);
    return card;
  };

  wrap.appendChild(createAddCard(
    'First Number',
    currentQ.a,
    addGroup1Count,
    () => {
      if(blocked || addGroup1Count >= currentQ.a) return;
      addGroup1Count++;
      playAddEmojiSound();
      updateAdditionZone();
    },
    () => {
      if(blocked || addGroup1Count <= 0) return;
      addGroup1Count--;
      playToggleSound();
      updateAdditionZone();
    }
  ));

  const plus = document.createElement('div');
  plus.className = 'plus-sign';
  plus.textContent = '+';
  wrap.appendChild(plus);

  wrap.appendChild(createAddCard(
    'Second Number',
    currentQ.b,
    addGroup2Count,
    () => {
      if(blocked || addGroup2Count >= currentQ.b) return;
      addGroup2Count++;
      playAddEmojiSound();
      updateAdditionZone();
    },
    () => {
      if(blocked || addGroup2Count <= 0) return;
      addGroup2Count--;
      playToggleSound();
      updateAdditionZone();
    }
  ));

  content.appendChild(wrap);
}

function updateSubtractionZone(){
  const content = document.getElementById('emoji-content');
  const hint = document.getElementById('sub-hint');
  const remaining = placedCount - crossedSet.size;
  const canAdd = placedCount < currentQ.a;

  if(placedCount === 0){
    document.getElementById('emoji-zone-title').textContent = `Tap ➕ to add your ${emoji}`;
  } else if(canAdd){
    document.getElementById('emoji-zone-title').textContent = `${placedCount} added - add more or cross some out!`;
  } else {
    document.getElementById('emoji-zone-title').textContent = `Cross out ${currentQ.b} to take away!`;
  }

  hint.style.display = hintOn ? 'block' : 'none';
  hint.textContent = `${placedCount} added - ${crossedSet.size} crossed out - ${remaining} left`;

  content.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'sub-grid';

  for(let i = 0; i < placedCount; i++){
    const btn = document.createElement('button');
    btn.className = 'sub-animal' + (crossedSet.has(i) ? ' crossed' : '');
    btn.type = 'button';
    btn.textContent = emoji;
    btn.setAttribute('aria-label', crossedSet.has(i) ? 'Undo cross out' : 'Cross out');
    btn.onclick = () => {
      if(blocked) return;
      if(crossedSet.has(i)) crossedSet.delete(i); else crossedSet.add(i);
      playToggleSound();
      updateSubtractionZone();
    };
    grid.appendChild(btn);
  }

  content.appendChild(grid);
  if(canAdd){
    const controls = document.createElement('div');
    controls.className = 'sub-controls';
    const addBtn = document.createElement('button');
    addBtn.className = 'add-animal-btn';
    addBtn.type = 'button';
    addBtn.textContent = '➕';
    addBtn.setAttribute('aria-label', `Add one ${emoji}`);
    addBtn.title = `Add a ${emoji}`;
    addBtn.onclick = () => {
      if(blocked || placedCount >= currentQ.a) return;
      placedCount++;
      playAddEmojiSound();
      updateSubtractionZone();
    };
    controls.appendChild(addBtn);
    content.appendChild(controls);
  }
}

function checkAnswer(){
  if(blocked) return;
  if(selectedAnswer === null){
    const fb = document.getElementById('feedback-msg');
    fb.textContent = 'Pick a number first! 👆';
    fb.className = 'feedback-msg wrong';
    playWrongSound();
    return;
  }

  blocked = true;
  const correct = selectedAnswer === currentQ.ans;
  const fb = document.getElementById('feedback-msg');
  if(currentQ.type === 'add') stats.addTotal++; else stats.subTotal++;

  if(correct){
    score++;
    if(currentQ.type === 'add') stats.addCorrect++; else stats.subCorrect++;
    fb.textContent = ['Amazing! 🎉','You got it! ⭐','Brilliant! 🌟','Wonderful! 🎈','Super smart! 🦋'][Math.floor(Math.random() * 5)];
    fb.className = 'feedback-msg right';
    document.getElementById('math-blank').textContent = currentQ.ans;
    document.querySelectorAll('.emoji-item,.sub-animal:not(.crossed)').forEach(e => {
      e.style.animation = 'none';
      setTimeout(() => { e.style.animation = 'bounce 0.5s ease'; }, 10);
    });
    playCelebrationSound();
    launchConfetti();
    setTimeout(nextQuestion, 1800);
  } else {
    fb.textContent = 'Oops! Try again 🙈';
    fb.className = 'feedback-msg wrong';
    const picker = document.getElementById('number-picker');
    picker.classList.add('shake');
    playWrongSound();
    setTimeout(() => {
      picker.classList.remove('shake');
      blocked = false;
    }, 500);
  }
}

function nextQuestion(){
  qIndex++;
  if(qIndex >= 10){
    showEnd();
    return;
  }
  loadQuestion();
}

function showEnd(){
  document.getElementById('main-screen').style.display = 'none';
  const end = document.getElementById('end-screen');
  const stars = score >= 9 ? '⭐⭐⭐' : score >= 6 ? '⭐⭐' : '⭐';
  const msg = score === 10 ? 'PERFECT!' : score >= 8 ? 'Amazing!' : score >= 5 ? 'Great job!' : 'Keep going!';
  const priorBest = Number(localStorage.getItem(BEST_SCORE_KEY) || 0);
  const best = Math.max(priorBest, score);
  localStorage.setItem(BEST_SCORE_KEY, String(best));
  const addPct = stats.addTotal ? Math.round((stats.addCorrect / stats.addTotal) * 100) : 0;
  const subPct = stats.subTotal ? Math.round((stats.subCorrect / stats.subTotal) * 100) : 0;
  end.innerHTML = `<div class="end-trophy">🏆</div>
  <div class="end-title">${msg}</div>
  <div class="end-score">${score} / 10</div>
  <div class="end-stars">${stars}</div>
  <div class="best-score">Best score: ${best} / 10</div>
  <div class="stats">Addition: ${addPct}% · Subtraction: ${subPct}%</div>
  <button class="play-again-btn" id="play-again-btn" type="button">Play Again! 🎮</button>`;
  end.style.display = 'flex';
  document.getElementById('play-again-btn').onclick = init;
  launchConfetti(60);
  if(score === 10){
    playSound('endPerfect', playCelebrationSound);
  } else {
    playSound('endTryAgain', playWrongSound);
  }
}

function launchConfetti(count = 30){
  const colors = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF6BD6','#FFA06B'];
  for(let i = 0; i < count; i++){
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.top = '-20px';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDuration = (1.2 + Math.random() * 1.5) + 's';
      c.style.animationDelay = (Math.random() * 0.5) + 's';
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 3000);
    }, i * 40);
  }
}

function playTone(freq, durationMs){
  if(!soundOn) return;
  if(!audioCtx){
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if(!AudioCtx) return;
    audioCtx = new AudioCtx();
  }
  const ctx = audioCtx;
  if(ctx.state === 'suspended') ctx.resume();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  const now = ctx.currentTime;
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.07, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + (durationMs / 1000));
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  setTimeout(() => {
    osc.stop();
  }, durationMs);
}

function initSoundFx(){
  soundFx = {};
  Object.entries(SOUND_FILES).forEach(([key, src]) => {
    const audio = new Audio(src);
    audio.preload = 'auto';
    soundFx[key] = audio;
  });
}

function playSound(name, fallbackFn){
  if(!soundOn) return;
  const sound = soundFx[name];
  if(!sound){
    if(fallbackFn) fallbackFn();
    return;
  }
  const instance = sound.cloneNode();
  instance.play().catch(() => {
    if(fallbackFn) fallbackFn();
  });
}

function playCorrectSound(){
  playSound('correct', () => {
    playTone(660, 100);
    setTimeout(() => playTone(880, 120), 80);
  });
}

function playClapSound(){
  if(!soundOn) return;
  if(!audioCtx){
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if(!AudioCtx) return;
    audioCtx = new AudioCtx();
  }
  const ctx = audioCtx;
  if(ctx.state === 'suspended') ctx.resume();

  const bufferSize = Math.floor(ctx.sampleRate * 0.08);
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i = 0; i < bufferSize; i++){
    data[i] = (Math.random() * 2 - 1) * (1 - (i / bufferSize));
  }

  const source = ctx.createBufferSource();
  source.buffer = buffer;
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 1700;
  filter.Q.value = 0.8;
  const gain = ctx.createGain();
  const now = ctx.currentTime;
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.09, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.09);

  source.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);
  source.start(now);
  source.stop(now + 0.09);
}

function playCelebrationSound(){
  playSound('celebration', () => {
    playCorrectSound();
    setTimeout(playClapSound, 40);
    setTimeout(() => playTone(990, 130), 160);
  });
}

function playWrongSound(){
  playSound('wrong', () => playTone(220, 160));
}

function playSelectSound(){
  playSound('select', () => playTone(520, 60));
}

function playToggleSound(){
  playSound('toggle', () => playTone(360, 70));
}

function playAddEmojiSound(){
  playSound('addEmoji', () => playTone(430, 85));
}

function playSubmitSound(){
  playSound('submit', () => playTone(300, 55));
}

function updateSoundToggle(){
  const btn = document.getElementById('sound-toggle');
  btn.textContent = soundOn ? 'Sound: On' : 'Sound: Off';
  btn.setAttribute('aria-pressed', soundOn ? 'true' : 'false');
}

function updateHintToggle(){
  const btn = document.getElementById('hint-toggle');
  btn.textContent = hintOn ? 'Hint: On' : 'Hint: Off';
  btn.setAttribute('aria-pressed', hintOn ? 'true' : 'false');
}

document.getElementById('submit-btn').addEventListener('click', () => {
  playSubmitSound();
  checkAnswer();
});
document.getElementById('sound-toggle').addEventListener('click', () => {
  soundOn = !soundOn;
  updateSoundToggle();
  if(soundOn) playToggleSound();
});
document.getElementById('hint-toggle').addEventListener('click', () => {
  hintOn = !hintOn;
  updateHintToggle();
  if(soundOn) playToggleSound();
  if(currentQ){
    if(currentQ.type === 'add') updateAdditionZone();
    else updateSubtractionZone();
  }
});

document.addEventListener('keydown', (e) => {
  if(document.getElementById('main-screen').style.display === 'none') return;
  if(e.key === 'Enter'){
    checkAnswer();
    return;
  }
  if(/^\d$/.test(e.key)){
    keyInputBuffer += e.key;
    if(keyInputTimer) clearTimeout(keyInputTimer);
    keyInputTimer = setTimeout(() => { keyInputBuffer = ''; }, 700);
    let n = Number(keyInputBuffer);
    if(n > maxAnswer){
      keyInputBuffer = e.key;
      n = Number(keyInputBuffer);
    }
    if(n <= maxAnswer){
      const btn = [...document.querySelectorAll('.num-btn')].find(b => Number(b.textContent) === n);
      if(btn) selectNumber(n, btn);
    }
  }
});

updateSoundToggle();
updateHintToggle();
init();
</script>
